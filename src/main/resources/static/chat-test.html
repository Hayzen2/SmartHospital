<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat Test</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; padding: 20px; margin: 0; }
    .container { display: flex; gap: 20px; height: calc(100vh - 140px); }
    .sidebar { width: 300px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
    .sidebar-header { background: #007bff; color: white; padding: 15px; font-weight: bold; }
    .conversation-list { overflow-y: auto; height: calc(100% - 100px); }
    .conversation { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    .conversation:hover { background: #f5f5f5; }
    .conversation.active { background: #e3f2fd; }
    .conversation-name { font-weight: bold; }
    .conversation-preview { font-size: 12px; color: #666; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conversation-time { font-size: 11px; color: #999; float: right; }
    .online-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; display: inline-block; margin-left: 5px; }
    .offline-dot { width: 8px; height: 8px; background: #ccc; border-radius: 50%; display: inline-block; margin-left: 5px; }
    .chat-panel { flex: 1; border: 1px solid #ccc; border-radius: 8px; display: flex; flex-direction: column; }
    .chat-header { background: #007bff; color: white; padding: 15px; font-weight: bold; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; display: flex; flex-direction: column; }
    .message { margin: 8px 0; padding: 10px 14px; border-radius: 18px; max-width: 70%; }
    .message.sent { background: #007bff; color: white; align-self: flex-end; }
    .message.received { background: #e9ecef; color: #333; align-self: flex-start; }
    .message-meta { font-size: 11px; margin-top: 4px; opacity: 0.7; }
    .chat-input { display: flex; padding: 15px; border-top: 1px solid #eee; background: white; }
    .chat-input input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; margin-right: 10px; }
    .chat-input button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; }
    .login-section { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
    .login-section input { padding: 8px; margin: 5px; width: 400px; }
    .login-section button { padding: 8px 16px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #status { margin-left: 10px; font-weight: bold; }
    .status-connected { color: green; }
    .status-disconnected { color: gray; }
    .status-error { color: red; }
    .new-chat-btn { padding: 10px; text-align: center; background: #f8f9fa; cursor: pointer; border-bottom: 1px solid #eee; }
    .new-chat-btn:hover { background: #e9ecef; }
    .role-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
    .role-doctor { background: #17a2b8; color: white; }
    .role-patient { background: #6c757d; color: white; }
    .user-info { margin-top: 10px; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <h3>💬 SmartHospital Chat</h3>
  
  <div class="login-section">
    <div>
      <label>JWT Token:</label>
      <input id="token" placeholder="Paste your JWT token here">
      <button onclick="connect()">Connect</button>
      <button onclick="disconnect()" style="background:#dc3545;">Disconnect</button>
      <span id="status" class="status-disconnected">Disconnected</span>
    </div>
    <div class="user-info" id="userInfo"></div>
  </div>

  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">Conversations</div>
      <div class="new-chat-btn" onclick="showNewChatDialog()">+ New Conversation</div>
      <div class="conversation-list" id="conversationList">
        <p style="padding: 20px; color: #999; text-align: center;">Connect to see conversations</p>
      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-header" id="chatHeader">Select a conversation</div>
      <div class="chat-messages" id="chatMessages">
        <p style="text-align: center; color: #999; margin-top: 50px;">Select a conversation to start chatting</p>
      </div>
      <div class="chat-input">
        <input id="messageText" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <div id="newChatModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="background:white; width:400px; margin:100px auto; padding:20px; border-radius:8px;">
      <h4>Start New Conversation</h4>
      <input id="newUserId" placeholder="Enter user ID to chat with" style="width:100%; padding:10px; margin:10px 0;">
      <button onclick="startNewChat()" style="padding:10px 20px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer;">Start Chat</button>
      <button onclick="closeNewChatDialog()" style="padding:10px 20px; margin-left:10px;">Cancel</button>
    </div>
  </div>

<script>
  let stompClient = null;
  let myUserId = null;
  let myRole = null;
  let currentChatUserId = null;
  let conversations = {};
  let jwtToken = null;

  function parseJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => 
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
      ).join(''));
      return JSON.parse(jsonPayload);
    } catch (e) {
      console.error('JWT parse error:', e);
      return null;
    }
  }

  function connect() {
    jwtToken = document.getElementById('token').value.trim();
    if (!jwtToken) {
      alert('Please enter a JWT token');
      return;
    }

    const payload = parseJwt(jwtToken);
    console.log('JWT Payload:', payload);
    
    if (payload) {
      // Extract userId and role
      myUserId = payload.userId;
      
      // Extract role - handle both array and string formats
      if (payload.roles && Array.isArray(payload.roles)) {
        myRole = payload.roles[0].replace('ROLE_', '');
      } else if (payload.role) {
        myRole = payload.role.replace('ROLE_', '');
      } else {
        myRole = 'UNKNOWN';
      }
      
      document.getElementById('userInfo').innerHTML = 
        `<strong>User ID:</strong> ${myUserId} | <strong>Role:</strong> <span class="role-badge role-${myRole.toLowerCase()}">${myRole}</span>`;
    }

    const socket = new SockJS('/ws');
    stompClient = Stomp.over(socket);

    stompClient.connect(
      { Authorization: 'Bearer ' + jwtToken },
      (frame) => {
        console.log('Connected:', frame);
        
        document.getElementById('status').textContent = 'Connected';
        document.getElementById('status').className = 'status-connected';

        // Subscribe to personal message queue
        stompClient.subscribe('/user/queue/messages', (frame) => {
          console.log('Received message:', frame.body);
          const msg = JSON.parse(frame.body);
          handleIncomingMessage(msg);
        });

        // Load conversations
        loadConversations();
      },
      (error) => {
        console.error('STOMP error:', error);
        document.getElementById('status').textContent = 'Connection Error';
        document.getElementById('status').className = 'status-error';
      }
    );
  }

  function disconnect() {
    if (stompClient) {
      stompClient.disconnect(() => {
        console.log('Disconnected');
        document.getElementById('status').textContent = 'Disconnected';
        document.getElementById('status').className = 'status-disconnected';
      });
    }
  }

  async function loadConversations() {
    try {
      const response = await fetch('/chat/getAllChats', {
        headers: { 'Authorization': 'Bearer ' + jwtToken }
      });
      
      if (!response.ok) {
        console.error('Failed to load conversations:', response.status);
        return;
      }
      
      const data = await response.json();
      console.log('Conversations:', data);
      renderConversations(data);
    } catch (e) {
      console.error('Failed to load conversations:', e);
    }
  }

  function renderConversations(convos) {
    const list = document.getElementById('conversationList');
    if (!convos || convos.length === 0) {
      list.innerHTML = '<p style="padding: 20px; color: #999; text-align: center;">No conversations yet</p>';
      return;
    }

    list.innerHTML = convos.map(c => {
      conversations[c.otherUserId] = c;
      const time = c.lastMessageTimestamp 
        ? new Date(c.lastMessageTimestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
        : '';
      const onlineDot = c.onlineStatus ? '<span class="online-dot"></span>' : '<span class="offline-dot"></span>';
      
      return `
        <div class="conversation ${currentChatUserId === c.otherUserId ? 'active' : ''}" onclick="openChat('${c.otherUserId}')">
          <span class="conversation-time">${time}</span>
          <div class="conversation-name">
            ${c.otherUserName || c.otherUserId} ${onlineDot}
          </div>
          <div class="conversation-preview">${c.lastMessage || 'No messages yet'}</div>
        </div>
      `;
    }).join('');
  }

  async function openChat(userId) {
    currentChatUserId = userId;
    const convo = conversations[userId];
    
    // Update header
    const name = convo ? convo.otherUserName : userId;
    const online = convo && convo.onlineStatus;
    document.getElementById('chatHeader').innerHTML = `
      Chat with ${name}
      ${online ? '<span class="online-dot"></span>' : '<span class="offline-dot"></span>'}
    `;

    // Mark as active in sidebar
    document.querySelectorAll('.conversation').forEach(el => el.classList.remove('active'));

    // Load chat history
    try {
      const response = await fetch(`/chat/getChatHistory?otherUserId=${userId}`, {
        headers: { 'Authorization': 'Bearer ' + jwtToken }
      });
      
      if (!response.ok) {
        console.error('Failed to load chat history:', response.status);
        return;
      }
      
      const messages = await response.json();
      console.log('Chat history:', messages);
      renderMessages(messages);
    } catch (e) {
      console.error('Failed to load chat history:', e);
    }
  }

  function renderMessages(messages) {
    const container = document.getElementById('chatMessages');
    if (!messages || messages.length === 0) {
      container.innerHTML = '<p style="text-align: center; color: #999; margin-top: 50px;">No messages yet. Say hello!</p>';
      return;
    }

    container.innerHTML = messages.map(msg => {
      const isMine = msg.senderId === myUserId;
      const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      const date = new Date(msg.timestamp).toLocaleDateString();
      
      return `
        <div class="message ${isMine ? 'sent' : 'received'}">
          <div>${msg.messageText}</div>
          <div class="message-meta">${msg.senderName} • ${date} ${time}</div>
        </div>
      `;
    }).join('');

    container.scrollTop = container.scrollHeight;
  }

  function handleIncomingMessage(msg) {
    console.log('Handling incoming message:', msg);
    
    // Determine the other user in this conversation
    const otherUserId = msg.senderId === myUserId 
      ? (myRole === 'DOCTOR' ? msg.patientId : msg.doctorId)
      : msg.senderId;

    // If viewing this conversation, append message
    if (currentChatUserId === otherUserId || currentChatUserId === msg.senderId || msg.senderId === myUserId) {
      const container = document.getElementById('chatMessages');
      const isMine = msg.senderId === myUserId;
      const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      const date = new Date(msg.timestamp).toLocaleDateString();

      // Remove "no messages" placeholder if present
      const placeholder = container.querySelector('p');
      if (placeholder) {
        container.innerHTML = '';
      }

      container.innerHTML += `
        <div class="message ${isMine ? 'sent' : 'received'}">
          <div>${msg.messageText}</div>
          <div class="message-meta">${msg.senderName} • ${date} ${time}</div>
        </div>
      `;
      container.scrollTop = container.scrollHeight;
    }

    // Refresh conversation list
    loadConversations();
  }

  function sendMessage() {
    if (!stompClient || !stompClient.connected) {
      alert('Please connect first');
      return;
    }
    if (!currentChatUserId) {
      alert('Please select a conversation first');
      return;
    }

    const messageText = document.getElementById('messageText').value.trim();
    if (!messageText) return;

    const payload = {
      receiverId: currentChatUserId,
      messageText: messageText,
      attachmentUrls: []
    };

    console.log('Sending message:', payload);
    stompClient.send('/app/send', {}, JSON.stringify(payload));
    document.getElementById('messageText').value = '';
  }

  function showNewChatDialog() {
    document.getElementById('newChatModal').style.display = 'block';
  }

  function closeNewChatDialog() {
    document.getElementById('newChatModal').style.display = 'none';
    document.getElementById('newUserId').value = '';
  }

  function startNewChat() {
    const userId = document.getElementById('newUserId').value.trim();
    if (!userId) {
      alert('Please enter a user ID');
      return;
    }

    // Add to conversations temporarily
    conversations[userId] = {
      otherUserId: userId,
      otherUserName: userId,
      onlineStatus: false,
      lastMessage: null
    };

    closeNewChatDialog();
    openChat(userId);
    loadConversations();
  }

  async function updateOnlineStatus(){
    if (stompClient && stompClient.connected) {
      stompClient.send('/app/online', {}, JSON.stringify({ userId: myUserId }));
    }
  }
  

</script>
</body>
</html>
