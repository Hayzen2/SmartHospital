spring:
  application:
    name: SmartHospital
  server:
    port: 8080
  cors:
    allowed-origins:
      - ${FRONTEND_URL}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Content-Type
    allow-credentials: true
    max-age: 3600

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
      lettuce:
        shutdown-timeout: 100
        
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com 
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    defer-datasource-initialization: true #Ensures DB is ready before JPA runs
    hibernate:
      ddl-auto: update #auto create and update table
    show-sql: true #Logs SQL queries to console

minio:
  url: http://localhost:9000
  accessKey: ${MINIO_USER}
  secretKey: ${MINIO_PASSWORD}
  bucket: avatars

jwt:
  secret: ${JWT_SECRET}
  access:
    expiration: 86400000 # 1 day
  refresh:
    expiration: 604800000 # 1 week
  otp:
    expiration: 300000 # 5 minutes

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: true
